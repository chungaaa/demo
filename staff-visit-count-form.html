<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>長照服務品質管理｜編輯訪視次數</title>

  <!-- Bootstrap 5 (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="dot"></span>
        <div>
          <div style="font-size:14px; line-height:1;">新竹縣智慧福利服務躍升</div>
          <div style="font-size:12px; opacity:.9; font-weight:800;">長照服務品質管理</div>
        </div>
      </div>

      <div class="nav-title">功能選單</div>

      <details class="mt-1" open>
        <summary class="menu-summary">
          <span class="menu-summary-title">長照服務品質管理</span>
          <span class="menu-summary-caret">▾</span>
        </summary>

        <ul class="menu mt-2">
          <li>
            <a href="./index.html">
              <span>個案管理</span>
            </a>
          </li>
          <li>
            <a href="./report.html">
              <span>統計報表</span>
            </a>
          </li>
          <li>
            <a class="active" href="./staff.html">
              <span>訪視員管理</span>
            </a>
          </li>
        </ul>
      </details>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div class="left">
          <span style="font-size:18px;">新竹縣智慧福利服務躍升</span>
          <span class="pill">訪視員管理</span>
        </div>
        <div style="opacity:.95; font-weight:800;">
          <span class="me-2">👤</span>系統管理員
        </div>
      </header>

      <div class="content">
        <div id="pageTitle" class="page-title">▶ 訪視員管理 / 每月訪視次數</div>

        <section class="card p-3">
          <div class="inline-tools">
            <button id="btnBack" type="button" class="btn btn-danger-soft btn-sm">返回</button>
            <button id="btnSave" type="button" class="btn btn-brand btn-sm">儲存</button>
          </div>

          <div class="section-title">編輯年度訪視次數</div>

          <form id="visitCountForm">
            <div class="row g-3">
              
              <div class="col-lg-6">
                <label class="lbl" for="vcYear">年度</label>
                <input id="vcYear" type="number" class="form-control" placeholder="例如：114" />
              </div>
              <div class="col-lg-6">
                <label class="lbl" for="vcCount">每月需訪視次數</label>
                <input id="vcCount" type="number" class="form-control" placeholder="請輸入數字" />
              </div>

            </div>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script src="./assets/app.js"></script>
  <script>
    (async function init(){
      if (!window.JOY) { alert("app.js not loaded!"); return; }
      const act = JOY.getQueryParam("act");
      const staffId = JOY.getQueryParam("staffId");
      const year = JOY.getQueryParam("year");

      // Re-using the same mock data structure for lookup
      const mockStaffData = {
        "s1": { id: "s1", visitCounts: [{year: "113", count: 20}, {year: "114", count: 25}] },
        "s2": { id: "s2", visitCounts: [{year: "114", count: 30}] },
        "s3": { id: "s3", visitCounts: [] }
      };

      const pageTitleEl = document.getElementById("pageTitle");
      const yearInput = document.getElementById("vcYear");
      const countInput = document.getElementById("vcCount");

      if (act === 'edit') {
        pageTitleEl.innerText = "▶ 訪視員管理 / 編輯訪視次數";
        const staff = mockStaffData[staffId];
        const visitCount = staff?.visitCounts.find(vc => vc.year === year);

        if (visitCount) {
          yearInput.value = visitCount.year;
          yearInput.readOnly = true; // Year is the key, should not be editable
          countInput.value = visitCount.count;
        } else {
          alert("查無該年度資料！");
          window.location.href = `./staff-form.html?id=${encodeURIComponent(staffId)}`;
        }
      } else if (act === 'add') {
        pageTitleEl.innerText = "▶ 訪視員管理 / 新增訪視次數";
        const currentRocYear = new Date().getFullYear() - 1911;
        yearInput.value = currentRocYear;
      } else {
        alert("無效的操作！");
        window.location.href = './staff.html';
      }

      // Back button
      document.getElementById("btnBack").addEventListener("click", () => {
        window.location.href = `./staff-form.html?id=${encodeURIComponent(staffId)}`;
      });

      // Save button
      document.getElementById("btnSave").addEventListener("click", () => {
        const yearVal = yearInput.value;
        const countVal = countInput.value;

        if (!yearVal || !countVal) {
          alert("年度與次數皆不可為空！");
          return;
        }
        if (isNaN(parseFloat(yearVal)) || isNaN(parseFloat(countVal))) {
            alert("年度與次數必須為數字！");
            return;
        }

        alert(`儲存成功！\n\n年度: ${yearVal}\n次數: ${countVal}`);
        window.location.href = `./staff-form.html?id=${encodeURIComponent(staffId)}`;
      });

    })();
  </script>
</body>
</html>
