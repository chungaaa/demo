<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>長照服務品質管理｜訪視員管理</title>

  <!-- Bootstrap 5 (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="dot"></span>
        <div>
          <div style="font-size:14px; line-height:1;">新竹縣智慧福利服務躍升</div>
          <div style="font-size:12px; opacity:.9; font-weight:800;">長照服務品質管理</div>
        </div>
      </div>

      <div class="nav-title">功能選單</div>

      <details class="mt-1" open>
        <summary class="menu-summary">
          <span class="menu-summary-title">長照服務品質管理</span>
          <span class="menu-summary-caret">▾</span>
        </summary>

        <ul class="menu mt-2">
          <li>
            <a href="./index.html">
              <span>個案管理</span>
            </a>
          </li>
          <li>
            <a href="./report.html">
              <span>統計報表</span>
            </a>
          </li>
          <li>
            <a class="active" href="./staff.html">
              <span>訪視員管理</span>
            </a>
          </li>
        </ul>
      </details>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div class="left">
          <span style="font-size:18px;">新竹縣智慧福利服務躍升</span>
          <span class="pill">訪視員管理</span>
        </div>
        <div style="opacity:.95; font-weight:800;">
          <span class="me-2">👤</span>系統管理員
        </div>
      </header>

      <div class="content">
        <div class="page-title">▶ 訪視員管理</div>

        <!-- Search card -->
        <section class="card">
          <div class="card-header-soft">資料篩選</div>

          <div class="form-grid">
            <div class="row align-items-center g-2">
              <div class="col-lg-2"><label class="lbl" for="sName">姓名</label></div>
              <div class="col-lg-4">
                <input id="sName" class="form-control" placeholder="輸入姓名" />
              </div>

              <div class="col-lg-2"><label class="lbl" for="sIdNo">身分證字號</label></div>
              <div class="col-lg-4">
                <input id="sIdNo" class="form-control" placeholder="輸入身分證字號" />
              </div>
            </div>
          </div>

          <div class="actions-row">
            <button id="btnSearch" class="btn btn-brand">查詢</button>
            <button id="btnAdd" class="btn btn-outline-primary ms-2">新增訪視員</button>
          </div>
        </section>

        <!-- Results table -->
        <div class="table-wrap mt-3">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th style="width: 25%;">單位</th>
                <th style="width: 20%;">姓名</th>
                <th style="width: 20%;">身分證</th>
                <th style="width: 15%;">是否停用</th>
                <th style="width: 20%;">功能</th>
              </tr>
            </thead>
            <tbody id="resultBody">
              <!-- rows injected by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="./assets/app.js"></script>
  <script>
    (async function init(){
      if (!window.JOY) { alert("app.js not loaded!"); return; }
      // 模擬訪視員資料 (實務上應從 API 取得)
      const mockStaff = [
        { id: "s1", unit: "新竹縣長照中心", name: "王小明", idNo: "A123456789", disabled: false, createdBy: "系統管理員", createdAt: "2025-01-10 09:00:00", updatedBy: "系統管理員", updatedAt: "2025-01-10 09:00:00" },
        { id: "s2", unit: "竹北日照中心", name: "陳大文", idNo: "B123456789", disabled: false, createdBy: "系統管理員", createdAt: "2025-01-11 14:30:00", updatedBy: "系統管理員", updatedAt: "2025-01-11 14:30:00" },
        { id: "s3", unit: "湖口護理之家", name: "林小美", idNo: "C123456789", disabled: true, createdBy: "系統管理員", createdAt: "2025-02-01 11:00:00", updatedBy: "張督導", updatedAt: "2025-02-05 16:20:00" }
      ];

      function renderTable(list){
        const tbody = document.getElementById("resultBody");
        tbody.innerHTML = "";
        if(!list.length){
          tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">查無資料</td></tr>`;
          return;
        }
        list.forEach(s => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${JOY.escapeHtml(s.unit)}</td>
            <td>${JOY.escapeHtml(s.name)}</td>
            <td>${JOY.escapeHtml(s.idNo)}</td>
            <td>${s.disabled ? '<span class="text-danger">是</span>' : '否'}</td>
            <td><button class="btn btn-sm btn-primary" data-id="${s.id}" data-act="edit">編輯</button></td>
          `;
          tbody.appendChild(tr);
        });
      }

      // 初始顯示
      renderTable(mockStaff);

      // 查詢功能
      document.getElementById("btnSearch").addEventListener("click", () => {
        const nameVal = document.getElementById("sName").value.trim();
        const idVal = document.getElementById("sIdNo").value.trim();
        
        const filtered = mockStaff.filter(s => {
          return JOY.includesLike(s.name, nameVal) && JOY.includesLike(s.idNo, idVal);
        });
        renderTable(filtered);
      });

      // 新增按鈕
      document.getElementById("btnAdd").addEventListener("click", () => {
        window.location.href = `./staff-form.html?act=add`;
      });

      // 編輯按鈕 (事件委派)
      document.getElementById("resultBody").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-act='edit']");
        if (!btn) return;
        const id = btn.dataset.id;
        window.location.href = `./staff-form.html?act=edit&id=${encodeURIComponent(id)}`;
      });
    })();
  </script>
</body>
</html>
