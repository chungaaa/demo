<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>長照服務品質管理｜訪視員資料</title>

  <!-- Bootstrap 5 (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="dot"></span>
        <div>
          <div style="font-size:14px; line-height:1;">新竹縣智慧福利服務躍升</div>
          <div style="font-size:12px; opacity:.9; font-weight:800;">長照服務品質管理</div>
        </div>
      </div>

      <div class="nav-title">功能選單</div>

      <details class="mt-1" open>
        <summary class="menu-summary">
          <span class="menu-summary-title">長照服務品質管理</span>
          <span class="menu-summary-caret">▾</span>
        </summary>

        <ul class="menu mt-2">
          <li>
            <a href="./index.html">
              <span>個案管理</span>
            </a>
          </li>
          <li>
            <a href="./report.html">
              <span>統計報表</span>
            </a>
          </li>
          <li>
            <a class="active" href="./staff.html">
              <span>訪視員管理</span>
            </a>
          </li>
        </ul>
      </details>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div class="left">
          <span style="font-size:18px;">新竹縣智慧福利服務躍升</span>
          <span class="pill">訪視員管理</span>
        </div>
        <div style="opacity:.95; font-weight:800;">
          <span class="me-2">👤</span>系統管理員
        </div>
      </header>

      <div class="content">
        <div class="page-title">▶ 訪視員資料</div>

        <section class="card p-3">
          <div class="inline-tools">
            <button id="btnBack" type="button" class="btn btn-danger-soft btn-sm">返回</button>
            <button id="btnSave" type="button" class="btn btn-brand btn-sm">儲存</button>
          </div>

          <div class="section-title">訪視員詳細資料</div>

          <form id="staffForm">
            <div class="row g-3">
              
              <div class="col-lg-6">
                <label class="lbl" for="fUnit">單位</label>
                <input id="fUnit" class="form-control" />
              </div>
              <div class="col-lg-6">
                <label class="lbl" for="fName">姓名</label>
                <input id="fName" class="form-control" />
              </div>

              <div class="col-lg-6">
                <label class="lbl" for="fIdNo">身分證</label>
                <input id="fIdNo" class="form-control" />
              </div>
              <div class="col-lg-6 d-flex align-items-end">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="fDisabled">
                  <label class="form-check-label" for="fDisabled">是否停用</label>
                </div>
              </div>

              <!-- Monthly Visit Count Section -->
              <div class="col-12">
                <div class="section-title mt-4">每月訪視次數</div>
                <div class="d-flex justify-content-end">
                  <button id="btnAddYear" type="button" class="btn btn-brand btn-sm">新增年度</button>
                </div>
                <div class="table-wrap mt-2">
                  <table class="table table-hover mb-0">
                    <thead>
                      <tr>
                        <th class="text-center">年度</th>
                        <th class="text-center">每月需訪視次數</th>
                        <th style="width: 100px;">功能</th>
                      </tr>
                    </thead>
                    <tbody id="visitCountBody"></tbody>
                  </table>
                </div>
              </div>

              <!-- Audit fields -->
              <div class="col-12"><div class="section-title mt-4">資料紀錄</div></div>
              
              <div class="col-lg-6">
                <label class="lbl" for="fCreatedBy">新增人員</label>
                <input id="fCreatedBy" class="form-control" readonly />
              </div>
              <div class="col-lg-6">
                <label class="lbl" for="fCreatedAt">新增時間</label>
                <input id="fCreatedAt" class="form-control" readonly />
              </div>
              <div class="col-lg-6">
                <label class="lbl" for="fUpdatedBy">修改成員</label>
                <input id="fUpdatedBy" class="form-control" readonly />
              </div>
              <div class="col-lg-6">
                <label class="lbl" for="fUpdatedAt">修改時間</label>
                <input id="fUpdatedAt" class="form-control" readonly />
              </div>

            </div>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script src="./assets/app.js"></script>
  <script>
    (async function init(){
      if (!window.JOY) { alert("app.js not loaded!"); return; }
      const act = JOY.getQueryParam("act"); // 'edit' or 'add'
      const id = JOY.getQueryParam("id");
      
      // 模擬訪視員資料 (實務上應從 API 取得)
      // 包含新增/修改的紀錄
      const mockStaffData = {
        "s1": { 
          id: "s1", unit: "新竹縣長照中心", name: "王小明", idNo: "A123456789", disabled: false, 
          createdBy: "系統管理員", createdAt: "2025-01-10 09:00:00", updatedBy: "系統管理員", updatedAt: "2025-01-10 09:00:00",
          visitCounts: [{year: "113", count: 20}, {year: "114", count: 25}]
        },
        "s2": { 
          id: "s2", unit: "竹北日照中心", name: "陳大文", idNo: "B123456789", disabled: false, 
          createdBy: "系統管理員", createdAt: "2025-01-11 14:30:00", updatedBy: "系統管理員", updatedAt: "2025-01-11 14:30:00",
          visitCounts: [{year: "114", count: 30}]
        },
        "s3": { 
          id: "s3", unit: "湖口護理之家", name: "林小美", idNo: "C123456789", disabled: true, 
          createdBy: "系統管理員", createdAt: "2025-02-01 11:00:00", updatedBy: "張督導", updatedAt: "2025-02-05 16:20:00",
          visitCounts: []
        }
      };

      const pageTitle = document.querySelector(".page-title");
      let currentVisitCounts = [];

      if (act === 'edit') {
        pageTitle.innerText = "▶ 訪視員管理 / 編輯";
        const rec = mockStaffData[id];
        if (rec) {
          document.getElementById("fUnit").value = rec.unit || "";
          document.getElementById("fName").value = rec.name || "";
          document.getElementById("fIdNo").value = rec.idNo || "";
          document.getElementById("fDisabled").checked = rec.disabled;
          document.getElementById("fCreatedBy").value = rec.createdBy || "";
          document.getElementById("fCreatedAt").value = rec.createdAt || "";
          document.getElementById("fUpdatedBy").value = rec.updatedBy || "";
          document.getElementById("fUpdatedAt").value = rec.updatedAt || "";
          currentVisitCounts = rec.visitCounts || [];
        } else {
          alert("查無此訪視員資料！");
          window.location.href = "./staff.html";
        }
      } else if (act === 'add') {
        pageTitle.innerText = "▶ 訪視員管理 / 新增";
        // 新增模式下，紀錄欄位為空，並預設帶入操作者資訊
        document.getElementById("fCreatedBy").value = "系統管理員 (儲存後產生)";
        document.getElementById("fCreatedAt").value = "(儲存後產生)";
        document.getElementById("fUpdatedBy").value = "";
        document.getElementById("fUpdatedAt").value = "";
        currentVisitCounts = [];
      }

      function renderVisitCounts() {
        const tbody = document.getElementById("visitCountBody");
        tbody.innerHTML = "";
        if (currentVisitCounts.length === 0) {
          tbody.innerHTML = `<tr><td colspan="3" class="text-center text-muted">無資料</td></tr>`;
          return;
        }
        currentVisitCounts.forEach((item, idx) => {
          const tr = document.createElement("tr");
          // In a real app, we'd use a unique ID for the record, but year is fine for this prototype.
          tr.innerHTML = `
            <td class="text-center">${JOY.escapeHtml(item.year)}</td>
            <td class="text-center">${JOY.escapeHtml(item.count)}</td>
            <td class="text-center"><button type="button" class="btn btn-primary btn-sm" data-act="edit-year" data-year="${item.year}">管理</button></td>
          `;
          tbody.appendChild(tr);
        });
      }

      renderVisitCounts();

      document.getElementById("btnAddYear").addEventListener("click", () => {
        window.location.href = `./staff-visit-count-form.html?act=add&staffId=${encodeURIComponent(id)}`;
      });

      // Event delegation for "管理" buttons in the visit count table
      document.getElementById("visitCountBody").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-act='edit-year']");
        if (!btn) return;
        const year = btn.dataset.year;
        window.location.href = `./staff-visit-count-form.html?act=edit&staffId=${encodeURIComponent(id)}&year=${year}`;
      });

      // 按鈕事件
      document.getElementById("btnBack").addEventListener("click", () => {
        window.location.href = `./staff.html`;
      });

      document.getElementById("btnSave").addEventListener("click", () => {
        const name = document.getElementById("fName").value;
        if (!name) {
          alert("請輸入姓名！");
          return;
        }
        alert(`儲存成功！\n\n姓名：${name}`);
        window.location.href = `./staff.html`;
      });

    })();
  </script>
</body>
</html>
