<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>長照服務品質管理｜個案管理（查詢）</title>

  <!-- Bootstrap 5 (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="dot"></span>
        <div>
          <div style="font-size:14px; line-height:1;">新竹縣智慧福利服務躍升</div>
          <div style="font-size:12px; opacity:.9; font-weight:800;">長照服務品質管理</div>
        </div>
      </div>

      <div class="nav-title">功能選單</div>

      <!-- 主類別：長照服務品質管理（可展開） -->
      <details class="mt-1" open>
        <summary class="menu-summary">
          <span class="menu-summary-title">長照服務品質管理</span>
          <span class="menu-summary-caret">▾</span>
        </summary>

        <ul class="menu mt-2">
          <li>
            <a class="active" href="./index.html">
              <span>個案管理</span>
            </a>
          </li>
          <li>
            <a href="./report.html">
              <span>統計報表</span>
            </a>
          </li>
          <li>
            <a href="./staff.html">
              <span>訪視員管理</span>
            </a>
          </li>
        </ul>
      </details>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div class="left">
          <span style="font-size:18px;">新竹縣智慧福利服務躍升</span>
          <span class="pill">個案管理</span>
        </div>
        <div style="opacity:.95; font-weight:800;">
          <span class="me-2">👤</span>系統管理員
        </div>
      </header>

      <div class="content">
        <div class="page-title">▶ 個案管理</div>

        <!-- Search card -->
        <section class="card">
          <div class="card-header-soft">資料篩選</div>

          <div class="form-grid">
            <!-- 查詢條件版面（依需求重新排列） -->
            <div class="search-rows">
              <!-- 1) 單位名稱：獨立一條 -->
              <div class="row align-items-center g-2 mb-2">
                <div class="col-lg-2"><label class="lbl" for="unitName">單位名稱</label></div>
                <div class="col-lg-10">
                  <input id="unitName" class="form-control" placeholder="輸入單位名稱（可模糊查詢）" />
                </div>
              </div>

              <!-- 2) 評估日期起迄：獨立一條 -->
              <div class="row align-items-center g-2 mb-2">
                <div class="col-lg-2"><label class="lbl" for="dateStart">評估日期起迄</label></div>
                <div class="col-lg-10 d-flex gap-2">
                  <input id="dateStart" type="date" class="form-control" />
                  <input id="dateEnd" type="date" class="form-control" />
                </div>
              </div>

              <!-- 3) 左：個案姓名｜右：縣市鄉鎮 -->
              <div class="row align-items-center g-2 mb-2">
                <div class="col-lg-2"><label class="lbl" for="caseName">個案姓名</label></div>
                <div class="col-lg-4">
                  <input id="caseName" class="form-control" placeholder="輸入個案姓名（可模糊查詢）" />
                </div>

                <div class="col-lg-2"><label class="lbl" for="town">縣市鄉鎮</label></div>
                <div class="col-lg-4">
                  <select id="town" class="form-select"></select>
                </div>
              </div>

              <!-- 4) 訪視人員：左邊下拉 -->
              <div class="row align-items-center g-2">
                <div class="col-lg-2"><label class="lbl" for="visitStaff">訪視人員</label></div>
                <div class="col-lg-4">
                  <select id="visitStaff" class="form-select"></select>
                </div>
                <div class="col-lg-6"></div>
              </div>
            </div>
          </div>

          <div class="actions-row">
            <button id="btnSearch" class="btn btn-brand">查詢</button>
          </div>
        </section>

        <!-- Results table -->
        <div class="table-wrap mt-3">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th style="width: 12%;">個案姓名</th>
                <th style="width: 15%;">身分證</th>
                <th style="width: 14%;">個案電話</th>
                <th style="width: 14%;">個案居住鄉鎮</th>
                <th style="width: 14%;">目前訪視人員</th>
                <th style="width: 10%;">功能</th>
              </tr>
            </thead>
            <tbody id="resultBody">
              <!-- rows injected by JS -->
            </tbody>
          </table>
        </div>

        <div class="small-hint mt-2">
          * 點「管理」會開啟第二頁（表單頁）並帶入該筆資料（使用 URL query 參數傳遞，後續可改 API/Router）。
        </div>
      </div>
    </main>
  </div>

  <script src="./assets/app.js"></script>
  <script>
    (async function init(){
      const data = await JOY.loadData();
      JOY.setSelectOptions(document.getElementById("town"), data.hsinchuTowns, "新竹縣（全部）");
      JOY.setSelectOptions(document.getElementById("visitStaff"), data.visitStaff || [], "全部");

      // initial render
      renderTable(data.mockRecords);

      document.getElementById("btnSearch").addEventListener("click", () => {
        const unitName = document.getElementById("unitName").value.trim();
        const caseName = document.getElementById("caseName").value.trim();
        const dateStart = document.getElementById("dateStart").value.trim();
        const dateEnd   = document.getElementById("dateEnd").value.trim();
        const town = document.getElementById("town").value;
        const visitStaff = document.getElementById("visitStaff").value;

        const filtered = data.mockRecords.filter(r => {
          return JOY.includesLike(r.unitName, unitName)
            && JOY.includesLike(r.caseName, caseName)
            && JOY.inDateRangeISO(r.assessDateISO, dateStart, dateEnd)
            && (town ? r.town === town : true)
            && (visitStaff ? r.visitStaff === visitStaff : true);
        });

        renderTable(filtered);
      });

      function renderTable(list){
        const tbody = document.getElementById("resultBody");
        tbody.innerHTML = "";

        if(!list.length){
          const tr = document.createElement("tr");
          tr.innerHTML = `<td colspan="6" class="text-center text-muted">查無資料</td>`;
          tbody.appendChild(tr);
          return;
        }

        for(const r of list){
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${escapeHtml(r.caseName)}</td>
            <td>${escapeHtml(r.idNo)}</td>
            <td>${escapeHtml(r.phone)}</td>
            <td>${escapeHtml(r.town)}</td>
            <td>${escapeHtml(r.visitStaff || "")}</td>
            <td>
              <button class="btn btn-action btn-sm" data-id="${r.id}">管理</button>
            </td>
          `;
          tbody.appendChild(tr);
        }

        tbody.querySelectorAll("button[data-id]").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-id");
            window.location.href = `./form.html?id=${encodeURIComponent(id)}`;
          });
        });
      }

      function escapeHtml(str){
        return String(str ?? "")
          .replaceAll("&","&amp;")
          .replaceAll("<","&lt;")
          .replaceAll(">","&gt;")
          .replaceAll('"',"&quot;")
          .replaceAll("'","&#039;");
      }
    })();
  </script>
</body>
</html>
